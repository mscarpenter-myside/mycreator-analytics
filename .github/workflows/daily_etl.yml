name: Daily ETL - MyCreator Analytics

on:
  schedule:
    # Roda todo dia às 08:00 BRT (11:00 UTC), 12:15 BRT (15:15 UTC) e às 17:00 BRT (20:00 UTC)
    - cron: '0 11 * * *'
    - cron: '15 15 * * *'
    - cron: '0 20 * * *'
  
  # Permite execução manual
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🚀 Executar ETL Principal
        env:
          # Autenticação MyCreator (prioridade: Email/Password)
          MYCREATOR_EMAIL: ${{ secrets.MYCREATOR_EMAIL }}
          MYCREATOR_PASSWORD: ${{ secrets.MYCREATOR_PASSWORD }}
          
          # Fallback: Cookie/Token (para compatibilidade)
          MYCREATOR_COOKIE: ${{ secrets.MYCREATOR_COOKIE }}
          MYCREATOR_TOKEN: ${{ secrets.MYCREATOR_TOKEN }}
          
          # Google Sheets
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          
          # Supabase (PostgreSQL)
          URI: ${{ secrets.URI }}
          
          # Configurações
          SHEET_TAB_NAME: "dados_brutos"
          WRITE_MODE: "overwrite"
          POSTS_LIMIT: "50"
          DEBUG_MODE: "false"
        run: |
          python run_etl.py
